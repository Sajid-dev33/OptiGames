<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Theft Auto V - Descarga</title>
    <link rel="icon" href="gta-v.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-card: rgba(10, 10, 12, 0.85);
            --accent: hsl(142, 70%, 45%);
            --accent-hover: hsl(142, 80%, 55%);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Contenedor principal con la imagen de fondo de tu carpeta */
        .main-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Ruta corregida hacia tu imagen */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)),
                url('Imagenes de juegos/Captura de pantalla 2026-06-05 165239.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
        }

        /* Recuadro de descarga flotante */
        .download-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            color: var(--text-primary);
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .download-subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .file-info {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
        }

        .file-info span strong {
            color: var(--text-primary);
        }

        .btn-download {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 18px;
            background-color: var(--accent);
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
        }

        .btn-download:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(31, 138, 112, 0.5);
        }

        .btn-download:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="main-container">
        <div class="download-box">
            <h1>Grand Theft Auto V</h1>
            <p class="download-subtitle">Servidor de Descarga Directa</p>

            <div class="file-info">
                <span>Tipo: <strong>Aplicación (.exe)</strong></span>
                <span>Tamaño: <strong>11.7 MB</strong></span>
            </div>

            <a href="Grand Theft Auto V_original.exe" download="Grand Theft Auto V.exe" class="btn-download">
                Descargar Ahora
            </a>
        </div>
    </div>

</body>

</html>
